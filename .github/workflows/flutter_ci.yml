name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Lints & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # you can define a specific flutter version here if preferred

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze source code
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test

      - name: Install Linux build requirements (for Integration tests)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev xvfb

      - name: Enable Linux Desktop support
        run: flutter config --enable-linux-desktop

      - name: Run Integration Tests
        # xvfb-run fakes a display so the Flutter Linux app can launch headlessly in CI
        run: xvfb-run flutter test integration_test/app_test.dart -d linux
